<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pacter — Veja a verdade sobre o seu dinheiro</title>
  <meta name="description" content="O Pacter reúne seus investimentos de qualquer corretora em um só lugar e mostra o desempenho real do seu patrimônio. Grátis, para Windows." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Paleta — documento de marca */
      --verde-fundo:   #0E2A23;
      --verde-fundo-2: #0A1F1A;
      --verde-comando: #00C896;
      --painel:        #13322A;
      --borda:         #1F4338;
      --branco-frio:   #F0F4F8;
      --prata:         #C9D1D9;
      --cinza:         #7E9189;
      --sans: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--verde-fundo); color: var(--branco-frio);
      font-family: var(--sans); line-height: 1.65; -webkit-font-smoothing: antialiased;
    }
    [id] { scroll-margin-top: 5rem; }  /* o cabeçalho fixo não cobre a seção ao navegar */

    /* foco visível para navegação por teclado */
    a:focus-visible, button:focus-visible {
      outline: 2px solid var(--verde-comando); outline-offset: 3px; border-radius: 6px;
    }

    /* ===================== CABEÇALHO ===================== */
    /* ícone à esquerda · menu ao centro · botão à direita */
    .cabecalho {
      position: fixed; inset: 0 0 auto 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; padding: 0.9rem clamp(1rem, 4vw, 2.5rem);
      background: rgba(14, 42, 35, 0.82); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--borda);
    }
    .marca { display: inline-flex; align-items: center; }
    .marca img { width: 34px; height: 34px; border-radius: 8px; display: block; }

    .menu {
      position: absolute; left: 50%; transform: translateX(-50%);  /* centro real do cabeçalho */
      display: flex; gap: 2rem;
    }
    .menu a {
      color: var(--prata); text-decoration: none; font-size: 0.92rem; font-weight: 500;
      transition: color 0.15s;
    }
    .menu a:hover { color: var(--branco-frio); }

    .btn-download {
      background: var(--verde-comando); color: var(--verde-fundo); font-weight: 600;
      font-size: 0.88rem; padding: 0.55rem 1.3rem; border-radius: 8px;
      text-decoration: none; white-space: nowrap; transition: opacity 0.15s;
    }
    .btn-download:hover { opacity: 0.88; }

    /* ===================== SEÇÃO 1 — HERO ===================== */
    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 7rem 1.5rem 4rem;
      background:
        radial-gradient(ellipse 80% 55% at 50% 0%, rgba(0, 200, 150, 0.12), transparent 70%),
        linear-gradient(180deg, var(--verde-fundo) 0%, var(--verde-fundo-2) 100%);
    }
    .hero-titulo {
      font-size: clamp(2.4rem, 6vw, 4.6rem); font-weight: 700; line-height: 1.07;
      letter-spacing: -0.03em; max-width: 18ch; margin-bottom: 1.5rem;
    }
    .hero-titulo em { font-style: normal; color: var(--verde-comando); }
    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem); color: var(--prata);
      max-width: 56ch; margin-bottom: 2.5rem;
    }
    .hero-acoes { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }

    .btn-primario {
      background: var(--verde-comando); color: var(--verde-fundo); font-weight: 600;
      font-size: 1rem; padding: 0.95rem 2rem; border-radius: 10px; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.5rem;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-primario:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-secundario {
      background: transparent; color: var(--prata); font-size: 1rem;
      padding: 0.95rem 1.8rem; border-radius: 10px; border: 1px solid var(--borda);
      text-decoration: none; transition: border-color 0.15s, color 0.15s;
    }
    .btn-secundario:hover { border-color: var(--cinza); color: var(--branco-frio); }

    /* ===================== RESPONSIVO ===================== */
    @media (max-width: 720px) {
      .menu { display: none; }  /* no celular o menu fica oculto por espaço — hambúrguer pode entrar depois */
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      * { transition: none !important; }
    }
  </style>
</head>
<body>

  <header class="cabecalho">
    <a href="#inicio" class="marca" aria-label="Pacter, ir para o início">
      <!-- ÍCONE: suba pacter.png junto deste HTML -->
      <img src="pacter.png" alt="" onerror="this.style.display='none'" />
    </a>

    <nav class="menu" aria-label="Seções da página">
      <a href="#inicio">Início</a>
      <a href="#recursos">Recursos</a>
      <a href="#download">Baixar</a>
    </nav>

    <a href="#download" class="btn-download">Baixe agora</a>
  </header>

  <main>
    <!-- ===================== SEÇÃO 1 ===================== -->
    <section class="hero" id="inicio">
      <h1 class="hero-titulo">Veja a <em>verdade</em><br />sobre o seu dinheiro</h1>
      <p class="hero-sub">O Pacter reúne seus investimentos de qualquer corretora em um só lugar e mostra o desempenho real do seu patrimônio.</p>
      <div class="hero-acoes">
        <a href="#download" class="btn-primario">⬇ Baixar para Windows</a>
        <a href="#recursos" class="btn-secundario">Saber mais</a>
      </div>
    </section>
  </main>

</body>
</html>
